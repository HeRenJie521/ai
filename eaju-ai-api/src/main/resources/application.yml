server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    # Tomcat 性能优化
    max-threads: ${SERVER_MAX_THREADS:200}
    min-spare-threads: ${SERVER_MIN_SPARE_THREADS:20}
    max-connections: ${SERVER_MAX_CONNECTIONS:10000}
    accept-count: ${SERVER_ACCEPT_COUNT:100}
    connection-timeout: ${SERVER_CONNECTION_TIMEOUT:20000}
    # 启用压缩
    compression: "on"
    compressable-mime-types: "application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css"
    compression-min-size: 1024

spring:
  application:
    name: eaju-ai-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 30MB
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  # Jackson 性能优化
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  # HTTP 客户端配置
  http-client:
    connect-timeout-ms: ${HTTP_CONNECT_TIMEOUT:10000}
    read-timeout-ms: ${HTTP_READ_TIMEOUT:180000}
    connection-request-timeout-ms: ${HTTP_CONNECTION_REQUEST_TIMEOUT:5000}
    max-total: ${HTTP_MAX_TOTAL:100}
    max-per-route: ${HTTP_MAX_PER_ROUTE:20}
    validate-after-inactivity-ms: 1000
    time-to-live-minutes: 10
  # 线程池配置
  thread-pool:
    core-size: ${THREAD_POOL_CORE:8}
    max-size: ${THREAD_POOL_MAX:32}
    queue-capacity: ${THREAD_POOL_QUEUE:1000}
    keep-alive-seconds: 60
  auth:
    # DMS 登录：GET ?method=appUserLogin&data={"phone","password","type"}
    dms-base-url: ${APP_AUTH_DMS_BASE_URL:https://superapp.51eanj.com/eaju_app_service/eajudms/DmsInterface}
    dms-login-method: ${APP_AUTH_DMS_LOGIN_METHOD:appUserLogin}
    dms-login-type: ${APP_AUTH_DMS_LOGIN_TYPE:1}
    # 登录会话在 Redis 中的前缀（值 JSON 含手机号、昵称、DMS 响应摘要等）
    session-redis-key-prefix: ${APP_AUTH_SESSION_REDIS_PREFIX:auth:session:}
    # 0 表示与 app.jwt.expiration-hours 相同
    session-ttl-hours: ${APP_AUTH_SESSION_TTL_HOURS:0}
  jwt:
    # 至少 32 字节 UTF-8；生产务必用环境变量覆盖
    secret: ${APP_JWT_SECRET:dev-jwt-secret-change-me-32bytes-minimum!!}
    expiration-hours: ${APP_JWT_EXPIRATION_HOURS:168}
  chat:
    redis-key-prefix: "chat:session:"
    redis-session-ttl-hours: 168
  # 代理上传到 eaju-open（multipart 字段名 file）；可用环境变量覆盖
  file-upload:
    proxy-url: ${APP_FILE_UPLOAD_PROXY_URL:https://wx.51eanj.com/eaju-open-api/api/file/upload/file}
