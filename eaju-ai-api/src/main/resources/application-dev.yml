# 开发环境（本地）：默认激活；PostgreSQL / Redis 本机
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eaju_ai
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 10s
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
