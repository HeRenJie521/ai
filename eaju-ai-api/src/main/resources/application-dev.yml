# 开发环境（本地）：连接测试环境数据库和 Redis
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/zhiyi
    username: postgres
    password: root
#    url: jdbc:postgresql://10.0.254.21:5432/eaju_ai
#    username: eaju_ai_user
#    password: anbang@123
    driver-class-name: org.postgresql.Driver
    hikari:
      # 连接池配置
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: HikariPool-Dev
      # 连接测试
      connection-test-query: SELECT 1
      # 初始化连接数
      initialization-fail-timeout: -1
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 10s
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
